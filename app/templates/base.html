<!DOCTYPE html>
<html lang="en" class="dark"> <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}JobHunter{% endblock %} — AI Job Intelligence</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#0D1117',     // Deep space background
              surface: '#161B22',  // Glassmorphism base layer
              teal: '#00BFA5',     // Cyber Teal
              gold: '#FFD600',     // Tech Gold
              textMuted: '#8B949E',// Subtle structural text
              textLight: '#F0F6FC' // Crisp foreground font
            }
          },
          fontFamily: {
            sans: ['Poppins', 'Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  {% block head %}{% endblock %}
</head>

<body class="bg-brand-dark text-brand-textLight font-sans antialiased min-h-screen flex flex-col transition-all duration-300">

  <nav class="sticky top-0 z-50 bg-brand-dark/80 backdrop-blur-xl border-b border-slate-800/60 shadow-xl">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between h-16">

      <a href="/" class="flex items-center gap-3 font-black text-xl group select-none">
        <div class="w-9 h-9 relative transform transition-transform duration-700 group-hover:rotate-180">
          <svg viewBox="0 0 100 100" class="w-full h-full">
            <circle cx="50" cy="50" r="40" stroke="#00BFA5" stroke-width="6" fill="none" stroke-dasharray="10 5 40 5"/>
            <circle cx="50" cy="50" r="40" stroke="#FFD600" stroke-width="6" fill="none" stroke-dasharray="0 65 30 100"/>
            <path d="M50 5 L50 20 M50 80 L50 95 M5 50 L20 50 M80 50 L95 50" stroke="#00BFA5" stroke-width="5" stroke-linecap="round"/>
            <path d="M38 35 H48 V58 C48 64 42 66 38 64 M62 35 V65 M52 50 H62" stroke="#FFD600" stroke-width="7" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <span class="tracking-wider">Job<span class="text-brand-teal group-hover:text-brand-gold transition-colors duration-300">Hunter</span></span>
      </a>

      <div class="hidden md:flex items-center gap-1">
        <a href="/"           class="nav-link {% if request.path == '/' %}active{% endif %}">Dashboard</a>
        <a href="/jobs"       class="nav-link {% if request.path == '/jobs' %}active{% endif %}">Jobs</a>
        <a href="/recommend"  class="nav-link {% if request.path == '/recommend' %}active{% endif %}">Recommend</a>
        <a href="/analytics"  class="nav-link {% if request.path == '/analytics' %}active{% endif %}">Analytics</a>
      </div>

      <div class="flex items-center gap-4">
        {% if last_run %}
        <span class="text-[10px] font-mono tracking-widest text-brand-teal hidden lg:inline-block bg-brand-surface border border-brand-teal/20 px-3 py-1 rounded-xl">
          LIVE // SYS_OK
        </span>
        {% endif %}
        <button onclick="triggerRefresh(this)" class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-brand-teal to-teal-600 hover:from-brand-gold hover:to-amber-500 text-brand-dark font-black text-xs tracking-wider transition-all duration-300 transform hover:-translate-y-0.5 shadow-lg shadow-brand-teal/10">
          REFRESH
        </button>
      </div>
    </div>
  </nav>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-8 py-12">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-slate-900/80 bg-brand-dark/40 backdrop-blur py-8 text-center text-[11px] font-mono tracking-widest text-brand-textMuted">
    CORE ENGINE v2.6 // DESIGN ARCHITECTURE BY HAZEM SALAH © 2026
  </footer>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
